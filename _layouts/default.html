<!DOCTYPE html>
<html lang="en-us" class="h-100">
  <head>
    <title>
      {% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{
      site.description }}
    </title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Theme detection: runs before paint to prevent flash of wrong theme -->
    <script>
      (function() {
        var stored = localStorage.getItem('theme');
        var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-bs-theme', theme);
      })();
    </script>
    <!-- Bootstrap 5.3 CSS (includes native dark mode via data-bs-theme) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/1p0TQGL0K35CkEXgkalSPuTzKJ6pQG"
      crossorigin="anonymous"
    />
    <!-- Custom stylesheet -->
    <link
      rel="stylesheet"
      href="{{ '/assets/css/styles.css' | relative_url }}"
    />
    <link rel="icon" href="{{ '/coffeecup.png' | relative_url }}" />
    <!-- Calendly badge widget begin -->
<link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
<script src="https://assets.calendly.com/assets/external/widget.js" type="text/javascript" async></script>
<script type="text/javascript">
  window.onload = function() {
    Calendly.initBadgeWidget({
      url: 'https://calendly.com/tonyneufeld/coffee',
      text: "", // still required (we'll hide it visually)
      color: '#38250E',
      textColor: '#ffffff',
      branding: undefined
    });
  }
</script>

<style>
/* Hide the text */
.calendly-badge-content {
  font-size: 0;
  line-height: 0;
  padding: 1px; /* adjust padding around the icon */
}

/* Replace text with the coffee cup image */
.calendly-badge-content::before {
  content: "";
  display: inline-block;
  background-image: url('/coffeecup_white.PNG'); /* <-- Adjust path if needed */
  background-size: contain;
  background-repeat: no-repeat;
  width: 24px;
  height: 24px;
  vertical-align: middle;
}

/* Optional: smooth hover effect */
.calendly-badge-content:hover::before {
  filter: brightness(1.2);
}
</style>
<!-- Calendly badge widget end -->
    {% seo %} {% feed_meta %} {%- if jekyll.environment == 'production' and
    site.google_analytics -%} {%- include google-analytics.html -%} {%- endif
    -%}
  </head>
  <body class="d-flex flex-column h-100">
    <div class="container">
      {% include navigation.html %}
      <div class="body">{{ content }}</div>
    </div>
    {% include footer.html %}
    <!-- JS for Bootstrap -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <!-- Apply Bootstrap classes to bare HTML elements from markdown -->
    <script>
      document.querySelectorAll('table').forEach(function(t) { t.classList.add('table', 'table-striped'); });
      document.querySelectorAll('blockquote').forEach(function(b) { b.classList.add('blockquote'); });
    </script>
  </body>
</html>
